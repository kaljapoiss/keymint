<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keymint — secure generator</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
  <style>
    :root {
      --bg: #0f172a;
      --bg-elevated: #1e293b;
      --surface: rgba(30, 41, 59, 0.72);
      --surface-hover: rgba(51, 65, 85, 0.85);
      --border: rgba(148, 163, 184, 0.2);
      --border-bright: rgba(94, 234, 212, 0.45);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --mint: #5eead4;
      --blue: #60a5fa;
      --accent: #7dd3fc;
      --accent-dim: rgba(94, 234, 212, 0.1);
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(15, 23, 42, 0.35);
      --font-ui: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-brand: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection {
      background: rgba(94, 234, 212, 0.28);
      color: #fff;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% -10%, rgba(94, 234, 212, 0.12), transparent 55%),
        radial-gradient(ellipse 55% 45% at 88% 5%, rgba(96, 165, 250, 0.1), transparent 50%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(30, 41, 59, 0.5), transparent 60%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
    }

    .logo {
      width: 72px;
      height: 72px;
      display: block;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(94, 234, 212, 0.2);
    }

    .brand-text h1 {
      font-family: var(--font-brand);
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand-text h1 span {
      color: var(--mint);
    }

    .brand-text .tagline {
      font-size: 0.92rem;
      margin-top: 0.35rem;
      color: var(--muted);
      font-weight: 500;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.75rem;
      padding: 0.35rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--mint);
      border: 1px solid rgba(94, 234, 212, 0.25);
      border-radius: 999px;
      background: rgba(94, 234, 212, 0.08);
    }

    .status-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--mint);
      opacity: 0.85;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      padding: 0.3rem;
      margin-bottom: 1.5rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .tab {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }

    .tab:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .tab.active {
      color: var(--text);
      background: rgba(94, 234, 212, 0.12);
      box-shadow: inset 0 0 0 1px rgba(94, 234, 212, 0.2);
    }

    .panel {
      display: none;
      opacity: 0;
      transform: translateY(8px);
    }

    .panel.active {
      display: block;
      animation: panel-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes panel-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .output-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .output {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 0.95rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #bae6fd;
      letter-spacing: 0.01em;
      word-break: break-all;
      min-height: 3rem;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: all;
      transition: border-color 0.2s, background 0.2s;
    }

    .output:hover {
      border-color: var(--border-bright);
      background: rgba(30, 41, 59, 0.95);
    }

    .output.flash {
      animation: output-flash 0.4s ease;
    }

    @keyframes output-flash {
      0% { border-color: var(--border); }
      40% { border-color: var(--mint); }
      100% { border-color: var(--border); }
    }

    .output.multiline {
      white-space: pre-line;
      align-items: flex-start;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .btn {
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      padding: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-icon svg {
      width: 1.1rem;
      height: 1.1rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .btn-icon:hover {
      border-color: var(--border-bright);
      color: var(--mint);
      background: var(--surface-hover);
    }

    .btn-icon.copied {
      border-color: rgba(74, 222, 128, 0.4);
      color: var(--success);
    }

    .btn-primary {
      width: 100%;
      margin-top: 0.65rem;
      color: #0f172a;
      font-weight: 600;
      background: linear-gradient(135deg, var(--mint) 0%, var(--blue) 100%);
      box-shadow: 0 4px 16px rgba(94, 234, 212, 0.22);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      box-shadow: 0 6px 20px rgba(96, 165, 250, 0.28);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .option-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
    }

    .option-row label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 5rem;
    }

    input[type="range"] {
      flex: 1;
      min-width: 120px;
      height: 6px;
      appearance: none;
      background: rgba(148, 163, 184, 0.25);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--mint);
      border: 2px solid #f8fafc;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--mint);
      border: 2px solid #f8fafc;
      cursor: pointer;
    }

    .length-val {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: var(--accent);
      min-width: 2ch;
      text-align: right;
    }

    .muted-val { color: var(--muted); min-width: auto; }

    .checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      padding: 0.35rem 0.5rem;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }

    .check:has(input:checked) {
      border-color: rgba(94, 234, 212, 0.3);
      background: rgba(94, 234, 212, 0.08);
      color: var(--text);
    }

    .check:hover {
      border-color: var(--border);
      background: var(--accent-dim);
    }

    .check input {
      accent-color: var(--mint);
      width: 1rem;
      height: 1rem;
    }

    select,
    .text-input {
      font-family: var(--font-ui);
      font-size: 0.875rem;
      padding: 0.55rem 0.8rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:focus,
    .text-input:focus {
      outline: none;
      border-color: var(--border-bright);
      box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.12);
    }

    .strength { margin-top: 0.75rem; font-size: 0.8rem; }

    .strength-bar {
      height: 5px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 3px;
      margin-top: 0.35rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.2s, background 0.2s;
    }

    .strength-label {
      font-family: var(--font-mono);
      color: var(--muted);
      margin-top: 0.3rem;
      font-size: 0.75rem;
    }

    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      letter-spacing: 0.02em;
    }

    kbd {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.12rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-elevated);
      color: var(--accent);
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.85;
    }

    @media (prefers-reduced-motion: reduce) {
      .panel.active { animation: none; opacity: 1; transform: none; }
      .output.flash { animation: none; }
    }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo-wrap">
          <img class="logo" src="logo.svg" width="72" height="72" alt="">
        </div>
        <div class="brand-text">
          <h1>Key<span>mint</span></h1>
          <p class="tagline">Passwords · API keys · Hostnames</p>
          <span class="status-pill">Client-side · No uploads</span>
        </div>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" role="tab" aria-selected="true" data-tab="password">Password</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="apikey">API key</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="hostname">Hostname</button>
    </nav>

    <!-- Password -->
    <section id="panel-password" class="panel active" role="tabpanel">
      <div class="card">
        <div class="output-row">
          <div class="output" id="out-password" aria-live="polite"></div>
          <button type="button" class="btn btn-icon" data-copy="out-password" title="Copy" aria-label="Copy password"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </div>
        <div class="options">
          <div class="option-row">
            <label for="pw-len">Length</label>
            <input type="range" id="pw-len" min="8" max="128" value="24">
            <span class="length-val" id="pw-len-val">24</span>
          </div>
          <div class="checkboxes">
            <label class="check"><input type="checkbox" id="pw-upper" checked> Uppercase (A–Z)</label>
            <label class="check"><input type="checkbox" id="pw-lower" checked> Lowercase (a–z)</label>
            <label class="check"><input type="checkbox" id="pw-digits" checked> Numbers (0–9)</label>
            <label class="check"><input type="checkbox" id="pw-symbols" checked> Symbols (!@#$…)</label>
          </div>
        </div>
        <div class="strength">
          <div class="strength-bar"><div class="strength-fill" id="pw-strength-bar"></div></div>
          <div class="strength-label" id="pw-strength-label">—</div>
        </div>
        <button type="button" class="btn btn-primary" id="btn-regen-password">New password</button>
        <p class="hint">Press <kbd>R</kbd> to regenerate.</p>
      </div>
    </section>

    <!-- API key -->
    <section id="panel-apikey" class="panel" role="tabpanel" hidden>
      <div class="card">
        <div class="output-row">
          <div class="output" id="out-apikey" aria-live="polite"></div>
          <button type="button" class="btn btn-icon" data-copy="out-apikey" title="Copy" aria-label="Copy API key"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </div>
        <div class="options">
          <div class="option-row">
            <label for="key-format">Format</label>
            <select id="key-format">
              <option value="hex64">Hex (64 chars) — sk_live_…</option>
              <option value="hex32">Hex (32 chars)</option>
              <option value="base64url">Base64URL (43 chars)</option>
              <option value="uuid">UUID v4</option>
              <option value="prefixed">With prefix (keymint_ + hex)</option>
            </select>
          </div>
          <div class="option-row" id="prefix-row" style="display: none;">
            <label for="key-prefix">Prefix</label>
            <input type="text" id="key-prefix" class="text-input" value="keymint_" maxlength="32">
          </div>
        </div>
        <button type="button" class="btn btn-primary" id="btn-regen-apikey">New key</button>
        <p class="hint">Press <kbd>R</kbd> to regenerate.</p>
      </div>
    </section>

    <!-- Hostname -->
    <section id="panel-hostname" class="panel" role="tabpanel" hidden>
      <div class="card">
        <div class="output-row">
          <div class="output multiline" id="out-hostname" aria-live="polite"></div>
          <button type="button" class="btn btn-icon" data-copy="out-hostname" title="Copy" aria-label="Copy hostnames"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
        </div>
        <div class="options">
          <div class="option-row">
            <label for="name-style">Style</label>
            <select id="name-style">
              <option value="nouns">nouns (falcon, prism)</option>
              <option value="animals">animals (wolf, hawk)</option>
              <option value="mythology">mythology (atlas, thor)</option>
              <option value="tech">technical (node, relay)</option>
              <option value="mixed">mixed (any category)</option>
            </select>
          </div>
          <div class="option-row">
            <label for="name-count">Count</label>
            <input type="range" id="name-count" min="1" max="24" value="5">
            <span class="length-val" id="name-count-val">5</span>
            <span class="length-val muted-val" id="name-pool-size"></span>
          </div>
        </div>
        <button type="button" class="btn btn-primary" id="btn-regen-hostname">New names</button>
        <p class="hint">Press <kbd>R</kbd> to regenerate.</p>
      </div>
    </section>

    <footer>Generated in your browser — nothing is sent to a server.</footer>
  </div>

  <script src="words.js"></script>
  <script>
    const CHARSET = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      digits: '0123456789',
      symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?'
    };
    const HEX = '0123456789abcdef';

    function dedupePool(words) {
      return [...new Set(words)];
    }

    const WORD_POOLS = {
      nouns: dedupePool(window.HOSTNAME_WORDS.nouns),
      animals: dedupePool(window.HOSTNAME_WORDS.animals),
      mythology: dedupePool(window.HOSTNAME_WORDS.mythology),
      tech: dedupePool(window.HOSTNAME_WORDS.tech),
      mixed: null
    };
    WORD_POOLS.mixed = dedupePool(
      WORD_POOLS.nouns.concat(WORD_POOLS.animals, WORD_POOLS.mythology, WORD_POOLS.tech)
    );

    const el = {
      pwLen: document.getElementById('pw-len'),
      pwLenVal: document.getElementById('pw-len-val'),
      pwUpper: document.getElementById('pw-upper'),
      pwLower: document.getElementById('pw-lower'),
      pwDigits: document.getElementById('pw-digits'),
      pwSymbols: document.getElementById('pw-symbols'),
      outPassword: document.getElementById('out-password'),
      pwStrengthBar: document.getElementById('pw-strength-bar'),
      pwStrengthLabel: document.getElementById('pw-strength-label'),
      keyFormat: document.getElementById('key-format'),
      keyPrefix: document.getElementById('key-prefix'),
      prefixRow: document.getElementById('prefix-row'),
      outApikey: document.getElementById('out-apikey'),
      nameStyle: document.getElementById('name-style'),
      nameCount: document.getElementById('name-count'),
      nameCountVal: document.getElementById('name-count-val'),
      namePoolSize: document.getElementById('name-pool-size'),
      outHostname: document.getElementById('out-hostname')
    };

    let activeTab = 'password';
    let cachedCharset = '';
    let hostnameCache = '';
    const randPool = new Uint32Array(16);
    let randAt = 16;
    const bytePool = new Uint8Array(128);

    function randomInt(max) {
      if (max <= 1) return 0;
      if (randAt >= randPool.length) {
        crypto.getRandomValues(randPool);
        randAt = 0;
      }
      return randPool[randAt++] % max;
    }

    function randomBytes(n) {
      const buf = n <= bytePool.length ? bytePool.subarray(0, n) : new Uint8Array(n);
      crypto.getRandomValues(buf);
      return buf;
    }

    function toHex(bytes) {
      let s = '';
      for (let i = 0; i < bytes.length; i++) {
        const b = bytes[i];
        s += HEX[b >> 4] + HEX[b & 15];
      }
      return s;
    }

    function toBase64Url(bytes) {
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function refreshCharset() {
      let s = '';
      if (el.pwUpper.checked) s += CHARSET.upper;
      if (el.pwLower.checked) s += CHARSET.lower;
      if (el.pwDigits.checked) s += CHARSET.digits;
      if (el.pwSymbols.checked) s += CHARSET.symbols;
      cachedCharset = s;
      return s;
    }

    function generatePassword() {
      const charset = cachedCharset || refreshCharset();
      const len = +el.pwLen.value;
      if (!charset) {
        el.outPassword.textContent = 'Select at least one character set';
        el.pwStrengthBar.style.width = '0%';
        el.pwStrengthLabel.textContent = '—';
        return '';
      }
      const bytes = randomBytes(len);
      const clen = charset.length;
      const chars = new Array(len);
      for (let i = 0; i < len; i++) chars[i] = charset[bytes[i] % clen];
      const pw = chars.join('');
      el.outPassword.textContent = pw;
      flashOutput(el.outPassword);

      const entropy = pw.length * Math.log2(clen);
      let pct, text, color;
      if (entropy < 40) { pct = 25; text = 'Weak'; color = 'var(--danger)'; }
      else if (entropy < 60) { pct = 50; text = 'Fair'; color = 'var(--warning)'; }
      else if (entropy < 80) { pct = 75; text = 'Good'; color = 'var(--accent)'; }
      else { pct = 100; text = 'Strong'; color = 'var(--success)'; }
      el.pwStrengthBar.style.width = pct + '%';
      el.pwStrengthBar.style.background = color;
      el.pwStrengthLabel.textContent = text + ' (~' + Math.round(entropy) + ' bits entropy)';
      return pw;
    }

    function generateApiKey() {
      const format = el.keyFormat.value;
      let key;
      switch (format) {
        case 'hex64':
          key = 'sk_' + toHex(randomBytes(32));
          break;
        case 'hex32':
          key = toHex(randomBytes(16));
          break;
        case 'base64url':
          key = toBase64Url(randomBytes(32));
          break;
        case 'uuid': {
          const b = randomBytes(16);
          b[6] = (b[6] & 0x0f) | 0x40;
          b[8] = (b[8] & 0x3f) | 0x80;
          const h = toHex(b);
          key = h.slice(0, 8) + '-' + h.slice(8, 12) + '-' + h.slice(12, 16) + '-' + h.slice(16, 20) + '-' + h.slice(20);
          break;
        }
        default:
          key = (el.keyPrefix.value || 'keymint_') + toHex(randomBytes(24));
      }
      el.outApikey.textContent = key;
      flashOutput(el.outApikey);
      return key;
    }

    function getHostnamePool() {
      return WORD_POOLS[el.nameStyle.value] || WORD_POOLS.mixed;
    }

    function syncNameCountLimit() {
      const max = getHostnamePool().length;
      el.nameCount.max = max;
      el.namePoolSize.textContent = '(' + max + ' unique)';
      if (+el.nameCount.value > max) {
        el.nameCount.value = max;
        el.nameCountVal.textContent = max;
      }
    }

    function pickUniqueHostnames(pool, count) {
      const available = dedupePool(pool).slice();
      const take = Math.min(count, available.length);
      const names = new Array(take);
      const used = new Set();

      for (let i = 0; i < take; i++) {
        const idx = randomInt(available.length);
        const word = available[idx];
        names[i] = word;
        used.add(word);
        available[idx] = available[available.length - 1];
        available.pop();
      }

      if (used.size !== take) {
        return pickUniqueHostnames(pool, count);
      }
      return names;
    }

    function generateHostnames() {
      syncNameCountLimit();
      const pool = getHostnamePool();
      const count = +el.nameCount.value;
      const names = pickUniqueHostnames(pool, count);
      hostnameCache = names.join('\n');
      el.outHostname.textContent = hostnameCache;
      flashOutput(el.outHostname);
      if (names.length !== new Set(names).size) {
        return generateHostnames();
      }
      return hostnameCache;
    }

    const generators = {
      password: generatePassword,
      apikey: generateApiKey,
      hostname: generateHostnames
    };

    const COPY_ICON = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

    function flashOutput(el) {
      if (!el) return;
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }

    function regenActive() {
      generators[activeTab]();
    }

    function copyText(text, btn) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '✓';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = COPY_ICON;
        }, 1200);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.toggle('active', t === tab);
          t.setAttribute('aria-selected', t === tab ? 'true' : 'false');
        });
        document.querySelectorAll('.panel').forEach(p => {
          const on = p.id === 'panel-' + activeTab;
          p.classList.toggle('active', on);
          p.hidden = !on;
        });
        regenActive();
      });
    });

    el.pwLen.addEventListener('input', e => { el.pwLenVal.textContent = e.target.value; });
    el.pwLen.addEventListener('change', generatePassword);
    ['pw-upper', 'pw-lower', 'pw-digits', 'pw-symbols'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        refreshCharset();
        generatePassword();
      });
    });

    el.keyFormat.addEventListener('change', e => {
      el.prefixRow.style.display = e.target.value === 'prefixed' ? 'flex' : 'none';
      generateApiKey();
    });
    el.keyPrefix.addEventListener('change', () => {
      if (el.keyFormat.value === 'prefixed') generateApiKey();
    });

    el.nameCount.addEventListener('input', e => { el.nameCountVal.textContent = e.target.value; });
    el.nameCount.addEventListener('change', generateHostnames);
    el.nameStyle.addEventListener('change', () => {
      syncNameCountLimit();
      generateHostnames();
    });

    document.getElementById('btn-regen-password').addEventListener('click', generatePassword);
    document.getElementById('btn-regen-apikey').addEventListener('click', generateApiKey);
    document.getElementById('btn-regen-hostname').addEventListener('click', generateHostnames);

    el.outPassword.addEventListener('click', generatePassword);
    el.outApikey.addEventListener('click', generateApiKey);
    el.outHostname.addEventListener('click', generateHostnames);

    document.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.getAttribute('data-copy');
        const text = id === 'out-hostname' ? hostnameCache : document.getElementById(id).textContent;
        copyText(text, btn);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.target.closest('input, select, textarea')) return;
      if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        regenActive();
      }
    });

    refreshCharset();
    syncNameCountLimit();
    generatePassword();
  </script>
</body>
</html>
